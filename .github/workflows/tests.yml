name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: uv run pytest -v --cov=listless --cov-report=term-missing

      - name: Install coverage CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pip install coverage

      - name: Coverage Report & Upload to covsrv
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sevenrats/covsrv-actions-github@main
        with:
          coverage-token: ${{ secrets.COVSRV_TOKEN }}
          reports-endpoint-url: ${{ secrets.COVSRV_REPORT_URL }}
